{% extends "base.html" %}
{% block title %}Log in — Campus Library{% endblock %}
{% block content %}
<div class="card">
  <h1>Member log in</h1>
  <p class="muted">After login you land on the <strong>member dashboard</strong> with all 7 use cases connected.</p>
  <form method="post" action="{{ url_for('login') }}">
    <label for="email">Email or name</label>
    <input id="email" name="email" type="text" required autocomplete="username" placeholder="sangeetha.mahendra@gwu.edu or Sangeetha">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
    <button type="submit">Log in</button>
  </form>
</div>
{% endblock %}
